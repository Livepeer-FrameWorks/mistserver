<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://eslfaceitgroup.com/wp-content/uploads/2020/02/efg-favicon-150x150.png" sizes="32x32">
    <title>TRANSPORT1</title>
    <style>
      html, body { 
        margin:0;
        padding: 0;
        height: 100%;
        width: 100%;
      }
      body {
        display: flex;
        flex-flow: column nowrap;
        font-family: Barlow, sans-serif;
        background: #222;
        color: #fff;
      }
      header {
        background: #000;
        color: #fff;
        padding: 0.5em;
        display: flex;
        align-items: center;
      }
      header .logo {
        height: 2em;
      }
      header > * {
        margin: 0 0.5em;
      }
      header .connection-status {
        flex-grow: 1;
        text-align: right;
      }
      .connection-status[data-status] {
        opacity: 1;
        transition: all 100ms;
      }
      .connection-status[data-status="connected"] {
        opacity: 0;
        transition: all 1s 2s;
      }
      main {
        flex-grow: 1;
        padding: 0.5em 1em;
        position: relative;
      }
      header .versions {
        display: none;
        opacity: 0;
        text-align: right;
      }
      header [data-status="connected"] + .versions {
        display: block;
        opacity: 0.5;
      }
      header .versions:not(:empty):before {
        content: "using ";
      }

      h1,h2,h3,h4,h5,.titlefont {
        font-weight: 700;
        text-transform: uppercase;
        font-family: Barlow Condensed, sans-serif
      }
      button {
        font-size: inherit;
      }

      .mediabar {
        margin: -0.5em;
        display: flex;
        flex-flow: row wrap;
      }
      .mediabar:empty:before {
        content: "None.";
        margin: 0.5em;
      }
      .media_elem {
        display: flex;
        flex-flow: column;
        background: #000;
        color: #fff;
        width: 20em;
        border: 3px solid #333;
        margin: 0.5em;
        vertical-align: top;
        position: relative;
        --packetloss: 0;
        --packetperc: 0%;
      }
      .media_elem[data-hwencode]:before {
        content: 'hardware encoder';
        content: attr(data-hwencode) ' encoder';
        display: block;
        text-align: center;
      }
      .media_elem[data-hwencode="no"]:before {
        content: 'software encoder';
      }
      .media_elem > p:first-child {
        order: -1;
      }

      .media_elem[data-packetloss]:not([data-packetloss=""]):not([data-packetloss="0"]) .packetloss {
        &:before {
          counter-reset: packetloss var(--packetloss);
          content: 'packetloss: ' counter(packetloss) '%';
        }
        
        text-align: center;
        margin: 0.5em 0;
        padding: 0.25em;
        background-image: linear-gradient(to right,darkred,darkred var(--packetperc),darkgreen var(--packetperc));
      }
      
      .media_elem img {
        width: auto;
        height: 10em;
        display: block;
        margin: 0.5em;
        object-fit: scale-down;
      }

      .media_elem img.preloader {
        outline: 1px solid blue;
        display: none;
      }
      .media_elem p {
        text-align: center;
        display: block;
        margin: 1em 0.5em;
      }
      .media_elem > p:first-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .media_elem > h5,
      .media_elem .autopush_list {
        margin: 0.5em;
      }
      .media_elem h5 {
        margin-bottom: 0;
      }
      .media_elem .tracks {
        display: flex;
        flex-flow: column nowrap;
        flex-grow: 1;

        > span {
          display: flex;
          flex-flow: row wrap;
          margin: 0 0.5em;
          --after: '';
          --unit: '';

          &:before {
            /* label of the track */
            content: attr(data-codec) ': ';
            width: 2.5rem;
            margin-right: 0.5em;
          }

          > span {
            margin: 0;

            &:empty {
              display: none;

              &.encoding { display: initial; }
            }
            &:not(:empty):has(+ span:not(:empty)):after {
              --after: ', ';
            }
            &:after {
              content: var(--unit) var(--after);
              margin-right: 0.25em;
              margin-left: 0.1em;
              filter: opacity(0.6);
            }
            &.jitter   { --unit: "ms"; }
            &.fps      { --unit: "fps"; }
            &.channels { --unit: "ch"; }
            &.bitrate  { --unit: "kbps"; }
            &.encoding {
              text-align: left;
              width: 1.5em;
              margin-right: 0.5em;

              &:after {
                display: none;
              }
            }
          }

        }

      }

      [data-warn="yes"]:before {
        content: '!';
        text-align: center;
        display: inline-block;
        font-size: 0.8em;
        height: 1em;
        aspect-ratio: 1;
        line-height: 1em;
        align-self: center;
        background-image: linear-gradient(to top left,darkorange,gold 50%);
        color: black;
        font-weight: bold;
        margin: 0 0.25em 0 0;
        clip-path: polygon(33% 0%, 67% 0%, 100% 33%, 100% 67%, 67% 100%, 33% 100%, 0% 67%, 0% 33%);
      }
      [data-warn="variable"]:before {
        content: '≃';
        color: gold;
        filter: opacity(0.6);
      }

        &:before {
          content: '(' attr(data-hwencode) ')';
          --icon: none;
          display: inline-block;
          height: 1lh;
          width: 100%;

          background-size: contain;

      .tooltip {
        background: #000;
        color: #fff;
        border: 2px solid #333;
        position: absolute;
        margin: 1em;
        padding: 0.25em 0.5em;
        z-index: 1;

        &:empty {
          display: none;
        }

        & > :first-child { margin-top:    0; }
        & > :last-child  { margin-bottom: 0; }

        table:empty {
          display: none;
          --unit: none;
        }

        table td:after {
          content: var(--unit);
          filter: opacity(0.6);
          margin-left: 0.1em;
        }
        table td:not(:last-child) {
          padding-right: 0.5em;
        }

        .encoding:before {
          width: 1lh;
          vertical-align: middle;
          margin-right: 0.25em;
        }
      }
      

      .autopush_list {
        display: flex;
        flex-flow: column nowrap;
      }
      .autopush_list:before {
        content: "Push to:"
      }
      .autopush_list:empty:after {
        content: "Destinations not configured";
        font-family: Barlow Condensed, sans-serif;
        font-weight: 700;
        display: block;
        margin: 0.5em 0;
        background: #999;
        color: #000;
        border: 2px solid #000;
        padding: 0.5em;
      }
      #sources .media_elem:hover {
        cursor: pointer;
        border-color: #555;
      }

      .media_elem .autopush_list > * {
        margin: 0.25em 0;
        text-align: left;
        cursor: pointer;
        background: #fff;
        color: #000;
        border: 2px solid #000;
        padding: 0.5em;
      }
      .media_elem .autopush_list > *:hover {
        filter: brightness(0.8);
        opacity: 1;
      }

      .forced_push {
        color: #888 !important;
        cursor: not-allowed !important;
      }
      .inactive_push, .push[data-enabled="false"]  {
        opacity: 0.6;
      }

      :is(.active_push, .inactive_push, .push[data-enabled]):before {
        content: '➡️';
        margin-right: 0.5em;
      }
      :is(.inactive_push, .push[data-enabled="false"]):before {
        content: '💤';
      }

      .autopush_list .push[data-enabled="false"] {
        order: 1;
      }

      .button_container  {
        display: flex;
        margin: 0 0.25em;
        align-items: end;
      }
      .button_container .button {
        margin: 0.5em 0.25em;
        flex-grow: 1;
      }
      .button {
        border: 1px solid black;
        background: orange;
        color: black;
        text-align: center;
        cursor: pointer;
        margin: 0.5em auto;
        padding: 0.5em; 
      }
      .button[data-icon]:before {
        content: attr(data-icon);
        display: inline-block;
        font-weight: normal;
        margin-right: 0.5em;
      }

      .media_elem .trash { margin-bottom: 0; }
      .trash:before {
        font-size: 1.8em;
        line-height: 0.5;
        margin-right: 0.25em;
        transform: translateY(0.06em);
      }

      #decklink:empty:before {

    </style>
    <script>

      let EFGconfig = {
        thumbURL: "http://localhost:8080/"
      };
      let thumbURL = EFGconfig.thumbURL;
      let remoteURL = "http://localhost:4242/api2";

      function saveConfig(cfg) {
        send({ui_settings: Object.assign(EFGconfig,cfg)}).then((o)=>{
          console.log("Config saved",send);
        }).catch((e)=>{
          console.log("Error while saving config",e);
        });
      }

      const connectionStatus = document.createElement("div");
      connectionStatus.classList.add("connection-status");
      const versions = document.createElement("div");
      versions.classList.add("versions");
      versions._values = [false,false];
      versions._set = function (index,value) {
        if (this._values[index] != value) {
          this._values[index] = value;
          this.innerText = this._values.filter((v)=>{ return v; }).join(" and ");
        }
      }

      function send(command) {
        return new Promise(function(resolve,reject){
          connectionStatus.innerText = "Connecting..";
          fetch(remoteURL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(command)
          }).then((r)=>{
              connectionStatus.setAttribute("data-status","connected");
              connectionStatus.innerText = "✅ Connected";

            if (r.status < 400) {
              r.json().then((d)=>{
                if (location.hash.includes("debug")) {
                  console.log(Object.keys(command)[0],"API request successful",{
                    command: command,
                    response: d
                  });
                }
                resolve(d);
              }).catch((e)=>{
                connectionStatus.setAttribute("data-status","failed");
                connectionStatus.innerText = "❌ Could not parse server response";
                reject(e);
              });
            }
            else {
              reject("API call received HTTP status "+r.status);
            }
          }).catch((e)=>{
            connectionStatus.setAttribute("data-status","failed");
            connectionStatus.innerText = "❌ Failed to connect to server";
            reject(e);
          });
        });
      }

      let sBar = null
      let tBar = null;

      function preloadImg(){
        let parent = document.createElement("div");
        parent.className = "thumbnail";
        parent.style.display = "contents";

        let src;
        parent.setSrc = function(s){
          src = new URL(s);
          src.searchParams.set("t",(Math.round(new Date().getTime()*1e-3)));
          src = src.toString();
          if (this.className == "thumbnail") {
            //it's not an mjpeg right now
            parent.querySelector(".preloader").setAttribute("src",src);
          }
        }
        function moveJPG(){
          parent.querySelector("img.preloader").setAttribute("src",src.replace(".jpg",".mjpg"));
          parent.className = "thumbnail moving";
        }
        function stopJPG(){
          parent.querySelector("img.preloader").setAttribute("src",src);
          parent.className = "thumbnail";
        }
        parent.addEventListener("mouseenter",function(e){
          moveJPG();
        });
        parent.addEventListener("mouseleave",function(e){
          stopJPG();
        });

        let img = document.createElement('img');
        parent.appendChild(img);
        let img2 = document.createElement('img');
        img2.className = "preloader";
        parent.appendChild(img2);
        let onload = function(myself,other){
          return function(){
            this.classList.remove("preloader");
            other.classList.add("preloader");
            other.removeAttribute("src");
          }
        };
        img.addEventListener("load",onload(img,img2));
        img2.addEventListener("load",onload(img2,img));
        return parent;
      }

      function formatBitrate (bps) {
        var base = 1000;
        var suffix = ['bps','kbps','Mbps','Gbps','Tbps','Pbps','Ebps','Zbps'];

        var newval = bps;
        var unit;
        if (newval == 0) { 
          unit = suffix[0];
        }
        else {
          var exponent = Math.floor(Math.log(Math.abs(bps)) / Math.log(base));
          if (exponent < 0) {
            unit = suffix[0];
          }
          else {
            newval = newval / Math.pow(base,exponent);
            unit = suffix[exponent];
          }
        }

        newval = new Intl.NumberFormat(undefined,{
          maximumSignificantDigits: 3,
          useGrouping: "min2"
        }).format(newval);

        return [newval,unit];
      }
  
      function Tooltip(activator,content_func,container) {
        let element = document.createElement("div");
        element.classList.add("tooltip");
        this.element = element;

        this.pos = function(pos){
          if (!element.offsetParent) return;
          var parpos = element.offsetParent.getBoundingClientRect();

          var mh = parpos.height - element.clientHeight;
          var mw = parpos.width - element.clientWidth;

          element.style.left = Math.min(pos.pageX - parpos.x,mw)+"px";
          element.style.top = Math.min(pos.pageY - parpos.y,mh)+"px";
        };
        this.show = function(position){
          let content = content_func();
          
          if (typeof content == "string") element.innerHTML = content;
          else {
            element.innerHTML = "";
            element.appendChild(content);
          }

          element.style.display = "";
          if (position) this.pos(position);
        };
        this.hide = function(){
          element.style.display = "none";
          element.innerHTML = "";
          element.style.left = "";
          element.style.top = "";
        };
        this.remove = function(){
          element.parentNode?.removeChild(element);
          this.element = null;
        };

        this.hide();
        container.appendChild(element);
        
        activator.addEventListener("mouseover",(e) => {
          this.show(e);
        });
        activator.addEventListener("mousemove",(e) => {
          element.style.display = "";
          this.pos(e);
        });
        activator.addEventListener("mouseout",(e) => {
          this.hide();
        });


      }

      function addStream(strm){
        let sElem = null;
        if (!document.getElementById("strm_"+strm.name)){

          let sElem = document.createElement('div');
          sElem.id = "strm_"+strm.name;
          sElem.className = "media_elem";

          sElem.setAttribute("data-tags",strm.tags ? strm.tags.join(" ") : "");

          let title = document.createElement('p');
          title.innerText = strm.name;
          title.setAttribute("title",strm.name);
          sElem.appendChild(title);

          sElem.appendChild(preloadImg());

          let hs = document.createElement("h5");
          hs.innerText = "Track stats:";
          sElem.appendChild(hs);
          let tracks = document.createElement("div");
          tracks.classList.add("tracks");
          sElem.appendChild(tracks);

          let packetloss = document.createElement("div");
          packetloss.classList.add("packetloss");
          sElem.appendChild(packetloss);


          let buttons = document.createElement("div");
          buttons.className = "button_container titlefont";
          let reset = document.createElement("p");
          reset.className = "button";
          reset.setAttribute("data-icon","↩️");
          reset.appendChild(document.createTextNode("Reset"));
          reset.title = "Disconnect sessions for this stream. This will kill any currently open connections (viewers, pushes and the input).";
          reset.onclick = function(e){
            e.stopPropagation();
            if (confirm("Are you sure you want to reset '"+strm.name+"'?\nThis will disconnect any currently open connections (viewers, pushes and the input).")) {
              send({stop_sessions:strm.name}).then(()=>{
                reset.innerText = "Done.";
                setTimeout(function(){ reset.innerText = "Reset"; },3e3);
              }).catch((e)=>{
                reset.innerText = "Failed";
              });
            }
          };
          buttons.appendChild(reset);
          let nuke = document.createElement("p");
          nuke.className = "button";
          nuke.setAttribute("data-icon","☢️");
          nuke.appendChild(document.createTextNode("Nuke"));
          nuke.title = "Shut down a running stream completely and/or clean up any potentially left over stream data in memory. It attempts a clean shutdown of the running stream first, followed by a forced shut down, and then follows up by checking for left over data in memory and cleaning that up if any is found.";
          nuke.onclick = function(e){
            e.stopPropagation();
            if (confirm("Are you sure you want to NUKE '"+strm.name+"'?\nThis will shut down a running stream completely, forcefully disconnecting any viewers, pushes and the input.")) {
              send({nuke_stream:strm.name}).then(()=>{
                nuke.innerText = "Nuked.";
                setTimeout(function(){ nuke.innerText = "Nuke"; },3e3);
              }).catch((e)=>{
                nuke.innerText = "Failed";
              });
            }

          };
          buttons.appendChild(nuke);
          sElem.appendChild(buttons);


          function clickStream(){

            //Remove list if already present
            if (this._pushlist){
              this._pushlist._remove();
              return false;
            }

            const createPushButton = (autopush) => {
              let stream = strm; //Note: only contains information from when this element was created: do not use for things that update, like tags

              let button = document.createElement("button");
              button.classList.add("push");
              button.classList.add("titlefont");

              let label = autopush.stream.slice(4).replaceAll("-"," ");
              button.appendChild(document.createTextNode(label));

              let tags = sElem.getAttribute("data-tags").split(" ");
              button.setAttribute("data-enabled",tags.includes(autopush.stream.slice(1)));

              button.setAttribute("title",autopush["x-LSP-notes"] ? autopush["x-LSP-notes"] : (button.getAttribute("data-enabled") == "true" ? "Enabled, click to disable" : "Disabled, click to enable" ));

              button.addEventListener("click",(e)=>{
                //toggle autopush of this stream to this target by adding the tag to the stream (both transient and persistent)
                //if this is a wildcard stream insert a new autopush rule instead of the persistent tag
                  
                const tag = autopush.stream.slice(1);

                if (button.getAttribute("data-enabled") == "true") {
                  //push is currently active: remove tag and stop active pushes
                  console.log("Disabling (auto)push of", stream.name, "to", autopush.target, "by removing", autopush.stream, "tag");

                  let c = { //remove transient tag and request stream config + push list
                    untag_stream: {
                      [stream.name]: autopush.stream.slice(1)
                    },
                    stream_tags: stream.name,
                    push_list: true
                  };
                  if (stream.name.includes("+")) {
                    c.push_auto_list = true;
                  }
                  else {
                    c.streams = true;
                  }
                  send(c).then((r1)=>{
                    let command = {};

                    if (stream.name.includes("+")) {
                      //remove autopush rule
                      let remove = [];
                      for (const id in r1.auto_push) {
                        const ap = r1.auto_push[id];
                        if ((ap["x-LSP-notes"] == autopush.stream) && (ap.stream == stream.name)) {
                          remove.push(id);
                        }
                      }
                      if (remove.length) {
                        command.push_auto_remove = remove;
                      }
                    }
                    else {
                      //remove persistent tag
                      let tagIndex = r1.streams[stream.name].tags.indexOf(tag);
                      while (tagIndex >= 0) { //remove all if it occurs more than once
                        r1.streams[stream.name].tags.splice(tagIndex,1);
                        command.addstream = { [stream.name]: r1.streams[stream.name] };
                        tagIndex = r1.streams[stream.name].tags.indexOf(tag);
                      }
                    }

                    //stop active pushes that match
                    if ("push_list" in r1) {
                      let stop = [];
                      for (const push of r1.push_list) {
                        if ((push[1] == stream.name) && (push[2] == autopush.target)) {
                          stop.push(push[0]);
                        }
                      }
                      if (stop.length) {
                        console.log("Stopping pushes:",stop);
                        command.push_stop = stop;
                        for (const push_id of stop) {
                          const cont = document.getElementById("push_"+push_id);
                          if (cont) {
                            const button = cont.querySelector(".trash");
                            if (button) {
                              button.innerText = "Stopping..";
                            }
                          }
                        }
                      }
                    }

                    if (Object.keys(command).length) {
                      send(command).then((r2)=>{
                        //Done! Apply taglist to element and close "Push to"-list
                        sElem.setAttribute("data-tags",r1.stream_tags[stream.name]?.join(" "));
                        clickStream.call(this);
                      });
                    }
                    else {
                      //we're done already
                      sElem.setAttribute("data-tags",r1.stream_tags[stream.name]?.join(" "));
                      clickStream.call(this);
                    }

                  });

                }
                else {
                  //push is currently inactive: add tag

                  //check if something else is already pushing to this target
                  const alreadyActive = tBar.querySelector(".media_elem[data-target=\""+autopush.target+"\"]");
                  if (alreadyActive) {
                    if (!confirm("A push to '" + label + "' is already running from channel '"+alreadyActive.children[0].children[0].innerText+"'!\n\nAre you sure you want to push '"+stream.name+"' there, too?")) { return; }
                  }

                  console.log("Enabling (auto)push of", stream.name, "to", autopush.target, "by adding", autopush.stream, "tag");
                  
                  send({ //add transient tag and request stream config
                    tag_stream: {
                      [stream.name]: tag
                    },
                    stream_tags: stream.name,
                    streams: true
                  }).then((r1)=>{
                    const finish = () => {
                      sElem.setAttribute("data-tags",r1.stream_tags[stream.name]?.join(" "));
                      clickStream.call(this);
                    }

                    if (stream.name.includes("+")) {
                      //add an autopush rule in case the source stream goes offline (and comes back later, but without the transient tag..)
                      send({
                        push_auto_add: {
                          stream: stream.name,
                          target: autopush.target,
                          "x-LSP-notes": autopush.stream //contains the tag, including the #
                        }
                      }).then((r2)=>{
                        finish();
                      });
                    }
                    else {
                      //check if persistent tag already exists
                      if (!r1.streams[stream.name].tags.includes(tag)) {
                        r1.streams[stream.name].tags.push(tag);
                        send({ //add persistent tag
                          addstream: { [stream.name]: r1.streams[stream.name] }
                        }).then((r2)=>{
                          //Done! Apply taglist to element and close "Push to"-list
                          finish();
                        });
                      }
                      else {
                        //we're done already
                        finish();
                      }
                    }
                  });

                }

                e.stopPropagation();
              });

              return button;
            }

            // Fetch current autopush list
            send({push_auto_list: true}).then(j => {
              let newList = document.createElement('div');
              newList.className = "autopush_list";
              newList._remove = function(){
                delete this.parentNode._pushlist;
                this.parentNode.removeChild(this); 
              };
              let seen = [];
              if ("auto_push" in j){
                for (s in j["auto_push"]){
                  const ap = j["auto_push"][s];

                  //display a button for every autopush for which ap.stream starts with "#T1-"

                  if (ap.stream.slice(0,4) != "#T1-") continue;
                  
                  newList.appendChild(createPushButton(ap));
                }
              }

              // Remove list if already present, add list to element
              if (this._pushlist){this._pushlist._remove();}
              this.appendChild(newList);
              this._pushlist = newList;
            });
          }
          sElem.onclick = clickStream;

          sBar.appendChild(sElem);
        }
        if(!sElem) sElem = document.getElementById("strm_"+strm.name);
        if (sElem) {
          sElem.querySelector(".thumbnail").setSrc(thumbURL + strm.name + ".jpg");

          if (strm.health) {
            let tracks = sElem.querySelector(".tracks");
            let seen = {};
            var iterator;
            if ("tracks" in strm.health) {
              iterator = strm.health.tracks;
            }
            else {
              iterator = Object.keys(strm.health);
            }
            for (let i of iterator) {
              if (typeof strm.health[i] == "object") {
                seen[i] = 1;
                
                let trackhealth = strm.health[i]
                let t = tracks.querySelector("[data-track=\""+i+"\"]");
                let fields = {
                  encoding: false
                };
                fields.jitter = function (d) {
                  this.setAttribute("data-warn",d?.jitter < 300 ? "no" : "yes");
                  return d?.jitter;
                };
                if (i.slice(0,5) == "video") {
                  fields.resolution = (d) => d ? [d?.width,d?.height].join("×") : undefined;
                  fields.fps = function(d) {
                    if (d) {
                      if (d.efpks) {
                        this.setAttribute("data-warn",d.efpks == d.fpks ? "no" : (d.fpks == 0 ? "variable" : "yes"));
                        return Math.round(d.efpks/10)/100;
                      }
                      else {
                        this.removeAttribute("data-warn");
                        return Math.round(d.fpks/10)/100;
                      }
                    }
                  }
                }
                else if (i.slice(0,5) == "audio") {
                  fields.channels = (d) => d?.channels;
                  fields.bitrate = function(d) {
                    if (!d || !d.kbits) return "";
                    [val,unit] = formatBitrate(d?.kbits * 1024);
                    this.style.setProperty("--unit","'"+unit+"'");
                    return val;
                  };
                }
                if (!t) {
                  t = document.createElement("span");
                  t.setAttribute("data-track",i);
                  t.setAttribute("data-track-idx",trackhealth.idx);
                  tracks.appendChild(t);
                  for (let name in fields) {
                    let e = document.createElement("span");
                    e.classList.add(name);
                    e.setAttribute("title",name);
                    if (fields[name]) {
                      e._set = function(d){
                        let v = fields[name].call(e,d);
                        if (v != this.innerText) {
                          this.innerText = v;
                        }
                      };
                    }
                    t.appendChild(e);
                  }
                  t._tooltip = new Tooltip(t,function(){
                    let health = t._health;
                    let fragment = new DocumentFragment();

                    let title = document.createElement("h2");
                    title.appendChild(document.createTextNode("Track "+health.idx+" — "+health.codec));
                    fragment.appendChild(title);

                    let table = document.createElement("table");
                    fragment.appendChild(table);
                    let layout = {
                      Encoder: () => [t.querySelector(".encoding")?.getAttribute("data-hwencode"),undefined,(ele)=>{
                        ele.className = "encoding";
                        ele.setAttribute("data-hwencode",ele.innerHTML);
                      }],
                      Jitter: () => [health?.jitter,"ms",(ele)=>{
                        if (health?.jitter >= 300) ele.setAttribute("data-warn","yes");
                      }],
                      Channels: () => health?.channels,
                      Samplerate: () => [health?.rate,"Hz"],
                      Resolution: () => health?.width ? [[health.width,health.height].join("×"),"px"] : undefined,
                      "Declared framerate": () => [health?.fpks / 1000,"fps",(ele)=>{
                        if (("fpks" in health) && ("efpks" in health)) {
                          ele.setAttribute("data-warn",health.efpks == health.fpks ? "no" : "yes");
                        }
                      }],
                      "Effective framerate": () => [health?.efpks / 1000,"fps"],
                      Bitrate: () => {
                        if (!health || !health.kbits) return;
                        return formatBitrate(health?.kbits * 1024);
                      },
                      "Keyframe interval": () => {
                        if (health?.keys?.ms_min && (i.slice(0,5) != "audio")) {
                          if (health.keys.ms_min == health.keys.ms_max) {
                            return [health.keys.ms_min,"ms"];
                          }
                          else {
                            return [health.keys.ms_min+"–"+health.keys.ms_max,"ms"];
                          }
                        } 
                      }
                    };
                    for (let key in layout) {
                      let content = layout[key]();
                      let unit, apply_after;
                      if (Array.isArray(content)) {
                        unit = content?.[1];
                        apply_after = content?.[2];
                        content = content[0];
                      }
                      if (content) {
                        let row = document.createElement("tr");
                        table.appendChild(row);
                        let l = document.createElement("td");
                        l.appendChild(document.createTextNode(key+":"));
                        row.appendChild(l);
                        let v = document.createElement("td");
                        v.innerHTML = content;
                        if (unit) {
                          v.style.setProperty("--unit","'"+unit+"'");
                        }
                        if (apply_after) {
                          apply_after(v);
                        }
                        row.appendChild(v);
                      }
                    }

                    return fragment;
                  },document.body);
                }
                t._health = trackhealth;
                if (t.getAttribute("data-codec") != trackhealth.codec) {
                  t.setAttribute("data-codec",trackhealth.codec);
                }
                for (let child of t.children) {
                  if ("_set" in child) {
                    child._set(trackhealth);
                  }
                }
                if (t._tooltip.element.checkVisibility()) {
                  t._tooltip.show();
                }
              }
            }
            for (var i = tracks.children.length-1; i >= 0; i--) {
              let child = tracks.children[i];
              if (!(child.getAttribute("data-track") in seen)) {
                tracks.removeChild(child);
                child._tooltip.remove();
              }
            }
          }
          sElem.setAttribute("data-tags",strm.tags ? strm.tags.join(" ") : "");

          let packetloss = function(current,previous){
            if (typeof previous == "undefined") return "";
            let packloss = current.packloss - previous.packloss;
            //let packretrans = current.packretrans - previous.packretrans;
            let packsent = current.packsent - previous.packsent;
            //let total = packloss + packretrans + packsent;
            let total = packloss + packsent;
            if (total == 0) return 0;
            return Math.round(100 * packloss / total);
          }(strm,laststats[strm.name]);
          sElem.setAttribute("data-packetloss",packetloss);
          sElem.style.setProperty("--packetloss",packetloss !== undefined ? packetloss : 0);
          sElem.style.setProperty("--packetperc",packetloss !== undefined ? packetloss+"%" : 0);
        }
      }

      let capabilitiesToggle = false;
      let laststats = {};
      function refresh(){
        let command = {
          active_streams: { longform: true },
          push_list: true,
          proc_list: true,
          push_auto_list: true,
          ui_settings: true,
          enumerate_sources: "sdi:",
          capabilities: capabilitiesToggle ? true : "sdi:" 
        };
        send(command).then(j => {

          if (j.ui_settings && j.ui_settings.thumbURL) {
            if (JSON.stringify(EFGconfig) != JSON.stringify(j.ui_settings)) {
              EFGconfig = j.ui_settings;
              thumbURL = EFGconfig.thumbURL;
              console.log("New config applied",EFGconfig);
            }
          }

          if ("active_streams" in j){
            // Keep a list of seen online streams
            let good = [];

            // Loop over all active streams
            for (s in j["active_streams"]){
              if (!j["active_streams"].hasOwnProperty(s)){continue;}
              const strm = j["active_streams"][s];
              strm.name = s;
              if (strm.status == "Online"){
                addStream(strm);
                good.push(s); // Add to seen list
              }
            }

            // Remove all stream entries we haven't seen
            for (let c of sBar.children){
              if (!good.includes(c.children[0].innerText)){
                sBar.removeChild(c);
                c.querySelectorAll(".tracks > *").forEach((t)=>{
                  t._tooltip?.remove();
                });
              }
            }
          }

          if ("push_list" in j){
            let reversePushes = {};
            if ("auto_push" in j) {
              for (const i in j.auto_push) {
                const ap = j.auto_push[i];
                if (ap.stream.slice(0,4) != "#T1-") {
                  //while we're here: check if this is an autopush rule created for a wildcard stream
                  if ((ap["x-LSP-notes"]?.slice(0,4) == "#T1-") && ap.stream.includes("+")) {
                    //does this stream have the appropriate transient tag?
                    const streamData = j.active_streams?.[ap.stream];
                    if (streamData) {
                      const tag = ap["x-LSP-notes"].slice(1);
                      if (!streamData.tags?.includes(tag)) {
                        //it does not! add it
                        console.log("Adding missing #"+tag+" tag for '"+ap.stream+"'");
                        send({
                          tag_stream: {
                            [ap.stream]: tag
                          }
                        }).then(()=>{});
                      }
                      //also add the tag to the existing stream DOM element
                      if (streamData.tags === null) { streamData.tags = []; }
                      streamData.tags.push(tag);
                      document.getElementById("strm_"+ap.stream).setAttribute("data-tags",streamData.tags.join(" "));
                    }
                  }
                  continue;
                }
                reversePushes[ap.target] = ap.stream.slice(4).replaceAll("-"," ");
              }
            }

            let good = [];
            for (s in j["push_list"]){
              const push = j["push_list"][s];
              good.push("push_"+push[0]);

              if (!document.getElementById("push_"+push[0])){
                let sElem = document.createElement('div');
                sElem.id = "push_"+push[0];
                sElem.className = "media_elem";
                sElem.setAttribute("data-target",push[2]);

                let p = document.createElement('p');
                sElem.appendChild(p);

                let title = document.createElement('span');
                title.innerText = push[1];
                title.onclick = () => {
                  document.getElementById("strm_"+push[1]).click();
                };
                p.appendChild(title);
                title.style.cursor = "pointer";


                p.appendChild(document.createTextNode(" » "+(push[2] in reversePushes ? reversePushes[push[2]] : push[2])));
                p.title = p.innerText;

                sElem.appendChild(preloadImg());

                let trash = document.createElement('p');
                trash.innerText = "Stop output";
                trash.className = "trash titlefont button";
                trash.title = "Stop push (will auto-restart if still enabled!)";
                trash.setAttribute("data-icon","♻");
                trash.onclick = () => {
                  if (confirm("Are you sure you want to stop the push of "+push[1]+" to "+push[2]+"?\nIf the push is still activated, it will auto-restart shortly after.")){
                    console.log("Stopping push:", push[0]);
                    send({push_stop: [push[0]]}).then((e)=>{
                      trash.innerText = "Done.";
                      setTimeout(function(){ trash.innerText = "Reset"; },3e3);
                    }).catch((e)=>{
                      trash.innerText = "Failed";
                    });
                  }
                };
                sElem.appendChild(trash);

                let buttons = document.createElement("div");
                buttons.className = "button_container titlefont";
                let reset = document.createElement("p");
                reset.className = "button";
                reset.setAttribute("data-icon","↩️");
                reset.appendChild(document.createTextNode("Reset"));
                reset.title = "Reset the decklink card for this output.";
                reset.onclick = function(e){
                  e.stopPropagation();
                  if (confirm("Are you sure you want to reset the decklink card for this output?\n"+push[1]+" » "+(push[2] in reversePushes ? reversePushes[push[2]] : push[2]))) {
                    send({push_reinit: [push[0]]}).then(()=>{
                      reset.innerText = "Done.";
                      setTimeout(function(){ reset.innerText = "Reset"; },3e3);
                    }).catch((e)=>{
                      reset.innerText = "Failed";
                    });
                  }
                };
                buttons.appendChild(reset);
                let nuke = document.createElement("p");
                nuke.className = "button";
                nuke.setAttribute("data-icon","☢️");
                nuke.appendChild(document.createTextNode("Nuke"));
                nuke.title = "Attempt to hard-kill the output.";
                nuke.onclick = function(e){
                  e.stopPropagation();
                  if (confirm("Are you sure you want to NUKE this output?\n"+push[1]+" » "+(push[2] in reversePushes ? reversePushes[push[2]] : push[2]))) {
                    send({push_kill: [push[0]]}).then(()=>{
                      nuke.innerText = "Nuked.";
                      setTimeout(function(){ nuke.innerText = "Nuke"; },3e3);
                    }).catch((e)=>{
                      nuke.innerText = "Failed";
                    });
                  }
                };
                buttons.appendChild(nuke);
                sElem.appendChild(buttons);

                tBar.appendChild(sElem);
              }
              try {
                document.getElementById("push_"+push[0]).querySelector(".thumbnail").setSrc(thumbURL + push[1] + ".jpg");
              }
              catch(e) {
                //console.error(e);
              }
            }
            // Remove all push entries we haven't seen
            for (let c of tBar.children){
              if (!good.includes(c.id)){tBar.removeChild(c);}
            }
          }

          if ("enumerate_sources" in j && Array.isArray(j["enumerate_sources"]) && j["enumerate_sources"].length > 0){
            const deckLinkCont = document.getElementById("decklink");
            let good = [];

            function formatStatus(str) {
              if (str == "DISABLED") { return "<span class=\"disabled\">DISABLED</span>"; }
              str = str.replace(/inactive/ig,"<span class=\"inactive\">inactive</span>");
              str = str.replace(/^ingesting/i,"input ingesting");
              str = str.replace(/^playing/i,"output playing");

              let rows = str.split(", ");
              let trs = [];
              for (let row of rows) {
                let tds = [];
                let words = row.split(" ");
                let firstword = words.shift()
                switch (firstword) {
                  case "input": 
                  case "output": {
                    tds.push("<td>"+firstword+":</td>");
                    tds.push("<td>"+words.join(" ")+"</td>");
                    break;
                  }
                  case "detected": {
                    tds.push("<td></td>");
                    tds.push("<td>detected "+words.slice(1)+"</td>");
                    break;
                  }
                  default: {
                    tds.push("<td colspan='2'>"+row+"</td>");
                  }
                }
                trs.push("<tr>"+tds.join("")+"</tr>");
              }

              if (trs.length) return "<table><tbody>"+trs.join("")+"</tbody></table>";
              return "";
            }

            for (s of j["enumerate_sources"]) {

              let str = s.split(" ");
              let source = str.shift();
              str = str.join(" ").split("(");
              let status = str.pop().trim().slice(0,-1);
              let name = str.join("(").trim();

              //sdi:getal devicename(any string) (device status)

              good.push("sdi_"+source);

              let sElem = document.getElementById("sdi_"+source);
              if (!sElem) {
                sElem = document.createElement("div");
                sElem.id = "sdi_"+source;
                sElem.className = "media_elem sdi_source";
                deckLinkCont.appendChild(sElem);

                let p = document.createElement("p");
                p.innerText = source; //sdi:0
                p.title = source;
                sElem.appendChild(p);

                let n = document.createElement("p");
                n.innerText = name; //DeckLink SDI 4K
                sElem.appendChild(n);

                let s = document.createElement("p");
                s.innerHTML = formatStatus(status);
                sElem.appendChild(s);
              }
              else {
                sElem.children[1].innerText = name;
                sElem.children[2].innerHTML = formatStatus(status);
              }
            }
            //remove all entries we haven't seen
            for (let c of deckLinkCont.children){
              if (!good.includes(c.id)){ deckLinkCont.removeChild(c); }
            }

          } 
          else {
            document.getElementById("decklink").innerText = "";
          }

          if ("proc_list" in j) {
            let streams_seen = {};
            for (let i in j.proc_list) {
              let proc = j.proc_list[i];

              //if (("ainfo" in proc) && ("encoder" in proc.ainfo)){
              if ("sink_tracks" in proc) {
                function getEncoder(proc_encoder) {
                  if (!proc_encoder) return "software";
                  let encoders = {
                    Vaapi: ["vaapi"],
                    Nvidia: ["nvidia","nvenc","cuda","cuvid","nvdec"],
                    "Intel QuickSync": ["intel","quicksync","qsv"],
                    VideoToolbox: ["videotoolbox"],
                    Vulkan: ["vulkan","vk"]
                  };
                  for (let e in encoders) {
                    for (let str of encoders[e]) {
                      if (proc_encoder.indexOf(str) >= 0) {
                        return e;
                      }
                    }
                  }
                  return "software";
                }
                let encoder = getEncoder(proc.ainfo?.encoder?.toLowerCase());

                let stream_elem = document.getElementById("strm_"+proc.sink);
                if (stream_elem) {
                  for (let idx of proc.sink_tracks) {
                    let track_elem = stream_elem.querySelector(".tracks [data-track-idx=\""+idx+"\"] .encoding");
                    if (track_elem) {
                      track_elem.setAttribute("data-hwencode",encoder);
                      track_elem.setAttribute("title","This track was encoded with "+encoder);
                    }
                  }
                  if (proc.sink in streams_seen) {
                    streams_seen[proc.sink] = streams_seen[proc.sink].concat(proc.sink_tracks);
                  }
                  else {
                    streams_seen[proc.sink] = proc.sink_tracks;
                  }
                }

              }
            }

            //remove attribute from other streams/tracks
            // Loop over all active streams
              for (s in j["active_streams"]){
                let stream_elem = document.getElementById("strm_"+s);
                if (stream_elem) {
                  if (!(s in streams_seen)) {
                    stream_elem.querySelectorAll(".tracks .encoding").forEach((e)=>{
                      e.removeAttribute("data-hwencode");
                      e.setAttribute("title","This is a source track");
                    });
                  }
                  else {
                    //find tracks not in streams_seen[s] and remove hwencode there
                    Array.from(stream_elem.querySelector(".tracks")?.children).forEach(function(e){
                      if (!e) return;
                      if (streams_seen[s].indexOf(Number(e.getAttribute("data-track-idx"))) == -1) {
                        let enc = e.querySelector(".encoding");
                        if (enc) {
                          enc.removeAttribute("data-hwencode");
                          enc.setAttribute("title","This is a source track");
                        }
                      }
                    });
                  }
                }
              }

          }
        
          if (("capabilities" in j) && (j.capabilities)) {
            if (j.capabilities.connectors && (j.capabilities.connectors.TSSRT || j.capabilities.connectors["TSSRT.exe"])) {
              //this is the response to {capabilities:true}: find the SRT connector and note the current libsrt version
              const SRT = j.capabilities.connectors.TSSRT || j.capabilities.connectors["TSSRT.exe"];
              //the last two words of the description should be "libsrt [VERSION]"
              versions._set(0,SRT.desc.split(" ").slice(-2).join(" "));
            }
            if (j.capabilities.name == "DeckLink") {
              try {
                //assume this is the response to {capabilities:"sdi:"}
                //looks like: "SDI input using DeckLink cards (SDK v14.4 / API v14.5)"

                //take whatever comes after the last opening bracket and snip off the last character; should now contain eg "SDK v14.4 / API v14.5"
                versions._set(1,"DeckLink "+j.capabilities.desc.split("(").pop().slice(0,-1));
                  /*
                version = version.split("/"); //["SDK v14.4 "," API v14.5"]
                for (const str of version) {
                  const entry = str.trim().split(" "); //["SDK","v14.4"]
                  document.body.setAttribute("data-SDI-"+entry[0]+"-version","Decklink "+entry[0]+" "+entry[1].replace("v","")); // data-SDI-SDK-version="Decklink SDK 14.4"
                }*/

              }
              catch(e) {}
            }
            capabilitiesToggle = !capabilitiesToggle;
          }
          laststats = j.active_streams;
        }).catch((e)=>{
          //fail silently: connection error handling is already done in the send() function
        });

      }//refresh function

      function docReady(fn) {
        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(fn, 1);
        }else{
          document.addEventListener("DOMContentLoaded", fn);
        }
      }
      docReady(() => {
        sBar = document.getElementById("sources");
        tBar = document.getElementById("targets");
        document.body.querySelector("header").append(connectionStatus);
        document.body.querySelector("header").append(versions);
        refresh();
        setInterval(refresh, 5000);
      });
    </script>
