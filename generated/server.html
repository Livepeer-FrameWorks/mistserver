nav .menu {
  display: flex;
  flex-flow: column nowrap;
  margin: 1em 0;
  font-size: 1.1em;
}
.hide {
  opacity: 0;
}
nav .menu.hide a {
  cursor: default;
}
nav a, nav a:hover {
  color: inherit;
  text-decoration: none;
}
nav .button {
  position: relative;
  padding: 0.1em 0.2em;
  white-space: nowrap;
}
nav .button > .highlighted {
  font-weight: bold;
  opacity: 0;
}
nav .button > .plain {
  position: absolute;
}
nav .button:hover > .highlighted,
nav .button.active > .highlighted {
  opacity: 1;
}
nav .button:hover > .plain,
nav .button.active > .plain {
  opacity: 0;
}
nav .submenu {
  opacity: 0;
  display: flex;
  flex-flow: column nowrap;
  margin-left: 1em;
}
nav .button:hover .submenu,
nav .button.active .submenu {
  opacity: 1;
}
nav .hiddenmenu {
  display: flex;
  flex-flow: column nowrap;
  margin-left: 1em;
}
nav .hiddenmenu .button {
  display: none;
}
nav .hiddenmenu .button.active {
  display: block;
}
nav .arrowdown > .plain::after,
nav .arrowdown > .highlighted::after {
  content: '';
  width: 0;
  height: 0;
  display: inline-block;
  border: 0.3em solid transparent;
  border-top-color: #333;
  border-bottom-width: 0.15em;
  margin-left: 0.3em;
}

header {
  color: #444;
  background-color: #9ec2da;
  background-image: linear-gradient(to top, rgba(255,255,255,0.3), rgba(255,255,255,0.7));
  padding: 1em 0.5em;
  border-bottom: 1px solid #aaa;
  display: flex;
  flex-flow: row nowrap;
  justify-content: space-between;
}
header #status {
  display: flex;
  flex-flow: column nowrap;
  text-align: right;
  justify-content: space-between;
  margin: -1em 0;
}
#connection {
  text-transform: uppercase;
  font-weight: bold;
}
#user_and_host {

}
#message {
  font-size: 0.8em;
  color: #888;
}
#message > a {
  text-decoration: underline;
  color: #555;
}

nav.secondary_menu {
  padding: 0;
  margin: 0 2em 0;
  background: none;
  box-shadow: none;
  border: none;
  flex-flow: row nowrap;
}
nav.secondary_menu .button {
  border: 1px solid #aaa;
  margin: 0 0.5em;
  padding: 0.2em 1em 0;
  box-shadow: 0.2em 0.2em 0.5em rgba(0,0,0,0.2);
}
nav.secondary_menu .button.active, nav.secondary_menu .button:hover {
  border-bottom-color: #fff;
  background-color: #fff;
}
.secondary_menu .separator {
  width: 5em;
  flex-grow: 0;
}

main {
  min-width: 30em;
  flex-grow: 1;
  padding: 1.5em 1em;
  position: relative;
}
main > button {
  float: right;
  margin: 0 0 0.5em 0.2em;
}
.filler:before {
  content: '';
  background-repeat: no-repeat;
  background-size: 100%;
  width: 40em;
  height: 30em;
  position: absolute;
  right: -6em;
  bottom: -10em;
  opacity: 0.2;
  z-index: -1;
}
.input_container {
  display: flex;
  flex-flow: column nowrap;
  margin: 0.5em 0;
}
.input_container .UIelement {
  display: flex;
  flex-flow: row nowrap;
  align-items: flex-start;
  margin: 0.1em 0;
}
.input_container .label {
  width: 20em;
}
.input_container .field_container {
  display: flex;
  flex-flow: row nowrap;
  width: 25em;
  margin: 0 0.25em;
  align-items: flex-start;
}
.input_container .field_container .field {
  flex-grow: 1;
  flex-shrink: 1;
  min-height: 1.5em;
  padding: 0 0.2em;
}
.input_container .field_container span.field {
  font-size: 0.8em;
  color: #777;
  text-indent: -1em;
  padding-left: 1em;
}
.input_container .field_container select.field, .input_container .field_container select:first-child  {
  min-width: 0;
  width: 100%;
  height: 1.8em;
}
.input_container .field_container input[type=checkbox].field {
  height: 1.5em;
  width: 1.5em;
  flex-grow: 0;
}
.input_container .field_container .field.bitmask {
  display: flex;
  flex-flow: row wrap;
  justify-content: space-between;
  padding: 0;
  margin-bottom: 0.5em;
}
.input_container .field_container .field.bitmask > label {
  display: flex;
  flex-flow: row nowrap;
  align-items: center;
  margin-right: -0.25em;
}
.input_container .field_container .field.bitmask > label > input { margin: 0; }
.input_container .field_container .field.bitmask > label > span { margin: 0 0.25em; }
textarea {
  font-size: 0.8em;
}
textarea.embed_code {
  white-space: pre;
}
.unit {
  color: #777;
  margin-left: 0.25em;
}
.field_container .unit {
  font-size: 0.9em;
}
select option[disabled] {
  display: none;
}
select option[value=""] {
  color: #808080;
}

.description {
  color: #777;
  font-size: 0.9em;
  flex-shrink: 1;
}
.text {
  font-size: 0.9em;
  flex-shrink: 1;
}
.input_container .help_container {
  position: relative;
  flex-grow: 1;
  min-width: 15em;
}
.ih_balloon, .err_balloon {
  background-color: #ededed;
  border-radius: 0.5em;
  border: 1px solid #bcbcbc;
  box-shadow: 0.1em 0.1em 0.25em #ccc;
  padding: 0.5em;
  text-align: justify;
  font-size: 0.8em;
  line-height: normal;
  position: absolute;
  left: 15px;
  display: none;
  z-index: 1;
}
.ih_balloon:before,
.ih_balloon:after,
.err_balloon:before, 
.err_balloon:after {
  content: '';
  width: 0;
  height: 0;
  position: absolute;
  top: 0.5em;
  left: -15px;
  border: 8px solid transparent;
  border-right-color: #ededed;
}
.ih_balloon:before,
.err_balloon:before {
  border-right-color: #bcbcbc;
  left: -16px;
}
.err_balloon {
  display: block;
  z-index: 0;
}
.input_container label.active { position: relative; }
.input_container label.active:after {
  content: "";
  display: block;
  position: absolute;
  z-index: -1;
  top: -0.25em;
  left: -0.25em;
  width: 55.5em;
  bottom: -0.25em;
  background: linear-gradient(to right,#9ec2da,transparent 55em);
  opacity: 0.3;
  filter: blur(0.1em);
}
.input_container label.active .ih_balloon,
.input_container > .help_container .ih_balloon {
  display: block;
  z-index: 1;
}
.input_container label.active .err_balloon {
  z-index: 1;
}
.err_balloon ~ .ih_balloon {
  display: none !important;
}
.input_container .button_container,
.input_container .text_container, 
.input_container .browse_container {
  margin: 0.5em 0;
  width: 45.25em;
  display: flex;
}
.input_container .text_container {
  margin: 0;
}
.input_container .text_container > * {
  margin: 0.5em 0;
}
.input_container .button_container {
  justify-content: flex-end;
}
button, input[type=submit], input[type=button], .mistbutton {
  border: 1px solid #aaa;
  padding: 0.2em 0.5em;
  background-color: #ddd;
  background-image: linear-gradient(to top, #ddd, #fff);
  color: #000;
  font-size: 0.8em;
  margin: 0 0.1em;
  text-decoration: none;
  cursor: pointer
}
/* double nested UI */
.UIelement .UIelement .label {
  width: 5em;
}
.UIelement .UIelement .field_container {
  width: auto;
  flex-grow: 1;
  margin-right: 0;
}
.UIelement .UIelement .help_container {
  display: none;
}
.UIelement.onlyshowhelp {
  margin: 0;
}
.UIelement.onlyshowhelp > *:not(.help_container) {
  height: 0;
  overflow: hidden;
}

.red {
  color: #b00 !important;
}
.orange {
  color: #f60 !important;
}
.green {
  color: #080 !important;
}

table, .flextable {
  border-collapse: collapse;
  border: 1px solid #ccc;
  box-shadow: 0.1em 0.1em 0.3em rgba(0,0,0,0.1);
  margin: 0.5em 0 1em 0;
  width: 100%;
  color: #333;
}
.flextable .tr {
  display: flex;
  flex-flow: row nowrap;
}
.flextable .tr .td, .flextable .tr .th {
  flex-grow: 1;
}
table tr:nth-child(even), .flextable .tr:nth-child(even) {
  background-color: #fff;
}
table tr:nth-child(odd), .flextable .tr:nth-child(even) {
  background-color: #f4f4f4;
}
table th, .flextable .th {
  color: #000;
  text-align: left;
  font-weight: normal;
  font-size: 1em;
}
table thead tr, .flextable .thead .tr, table tr.header {
  border-bottom: 1px solid #ccc;
  background-image: linear-gradient(to top, #ddd, #eee);
}
table td.vheader {
  padding: 0.8em 0.2em;
  border-right: 1px solid #ccc;
  background-image: linear-gradient(to left, #ddd, #eee);
  min-width: 1.5em;
  position: relative;
}
table td.vheader span {
  transform: translate( calc(-50% + 0.75em) ) rotate(-90deg);
  transform-origin: 50% 50%;
  white-space: nowrap;
  display: block;
  position: absolute;
}
table td, table th, .flextable .td, .flextable .th {
  padding: 0.2em 0.8em;
}
table tr:hover {
  background-color: #ddd;
}
table tbody, .flextable .tbody {
  font-size: 0.95em;
}
table.nolay {
  border: none;
  box-shadow: none;
}
table.nolay > tbody > tr {
  background: none;
}

table.valigntop td,
table.valigntop th {
  vertical-align: top;
}

.browse_container {
  flex-flow: column nowrap;
  display: block;
  color: #333;
  outline: 1px dashed #bbb;
  min-width: 0;
}
.browse_contents {
  font-size: 0.9em;
  padding: 0.25em;
  border-top: 1px dashed #bbb;
  -webkit-column-width: 15em;
  -moz-column-width: 15em;
  column-width: 15em;
  -webkit-column-width: -webkit-min-content;  /*not supported by any atm but oh well*/
  -moz-column-width: -moz-min-content;
  column-width: min-content;
}
.browse_contents .folder,
.browse_contents .file {
  text-decoration: none;
  margin-right: 2em;
  line-height: normal;
  display: block;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  min-width: 0;
  max-width: 20em;
}
.browse_contents .folder:hover,
.browse_contents .file:hover {
  color: #505050;
}
.browse_contents .folder {
  background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAQElEQVQ4y2NgGDGgC4h/APF/NLyDGM0xQHwfiEWwyIEMYdiJxWRkfAmILXAY/h9OkAlGDRg1AK53B4GUiA/vAADa9zOQ4KKOyQAAAABJRU5ErkJggg==');
  background-repeat: no-repeat;
  padding-left: 1.3em;
}
.field_container.limit_list, .limit_value_list {
  display: flex;
  flex-flow: column nowrap;
  align-items: stretch;
}
.field_container.limit_list > select {
  align-self: flex-start;
}
.limit_value_list > * {
  margin-top: 0.15em;
}
.radioselect {
  display: flex;
  flex-flow: column nowrap;
  font-size: 0.9em;
}
.radioselect label {
  display: flex;
  flex-flow: row nowrap;
  margin: 0.1em 0;
}
.radioselect label > span {
  min-width: 6em;
}
.radioselect label > select {
  margin-left: 1em;
  flex-grow: 1;
}
.input_container .field_container .field.selectinput,
.input_container .field_container .field.inputlist {
  padding-left: 0;
  padding-right: 0;
  padding-bottom: 0.5em;
}
.input_container .field_container .field.inputlist > * {
  width: 100%;
  box-sizing: border-box;
}
.input_container .field_container .field.checkcontainer {
  font-size: 0.8em;
  border: 1px solid #bbb;
}
.input_container .field_container .field .controls {
  border-bottom: 1px dashed #bbb;
}
.input_container .field_container .field .checklist {
  -webkit-column-width: 10em;
  -moz-column-width: 10em;
  column-width: 10em;
  min-height: 0;
  max-height: 10em;
  overflow-y: auto;
}
.input_container .field_container .field .checklist label {
  display: block;
}
input[type=radio] {
  height: 1.1em;
  width: 1.1em;
}
.input_container .itemsettings {
  margin-bottom: 1em;
  margin-left: 1em;
}
.input_container .subitem {
  font-size: 0.9em;
  color: #777;
  width: 25em;
  min-width: auto;
  display: flex;
  flex-flow: row nowrap;
}
.input_container .subitem .itemdetails {
  overflow: hidden;
  min-width: auto;
  flex-shrink: 1;
  flex-grow: 1;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.input_container .subitem:first-child button.move {
  display: none;
}

[disabled] {
  opacity: 0.75;
}
.overflow_ellipsis {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  max-width: 15em;
}

.graph_container {
  background-color: white;
  display: flex;
  flex-flow: row wrap;
}
.graph_container .graph {
  border: 1px solid #ccc;
  margin: 0.1em;
  padding: 0 0.5em;
  flex-grow: 1;
  display: flex;
  flex-flow: row nowrap;
  position: relative;
}
.graph_container .plot {
  width: 400px;
  height: 400px;
  margin: 0 auto;
  flex-grow: 1;
}
.graph_container .plot > .graphforeground {
  width: 100%;
  height: 100%;
  display: block;
}
.graph_container .plot > .graphbackground {
  position: absolute;
  display: block;
  opacity: 0.5;
}
.legend {
  font-size: 0.8em;
  min-width: 15em;
  position: absolute;
  top: 1em;
  right: 2em;
  background-color: rgba(255,255,255,0.6);
  border: 1px solid #ccc;
  padding: 0.5em 1em;
}
.legend > .close {
  position: absolute;
  top: 0.5em;
  right: 0.5em;
}
.legend-list > label {
  display: block;
}
.series-color {
  width: 1em;
  height: 1em;
  display: inline-block;
  margin: 0 0.5em;
  box-shadow: 0.1em 0.1em 0.2em rgba(0,0,0,0.2);
}
.legend-list .close {
  position: absolute;
  right: 0.5em;
}
#tooltip {
  position: absolute;
  display: none;
  border: 1px solid #b4b4b4;
  background-color: rgba(255,255,255,0.9);
  box-shadow: 0.2em 0.2em 0.5em rgba(0,0,0,0.2);
  font-size: 0.9em;
  padding: 0.5em 0.5em 0 0.5em;
  z-index: 10;
  color: rgba(0,0,0,0.9);
}
.separator {
  flex-grow: 1;
}
#ih_button, body.helpme #ih_button:hover {
  width: 1.2em;
  line-height: 1.2em;
  height: 1.2em;
  font-weight: bold;
  border: 2px solid #bcbcbc;
  border-radius: 2em;
  text-align: center;
  background-color: #ededed;
  color: white;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
  text-shadow: 1px 1px 2px #6696ce;
  cursor: pointer;
  align-self: flex-end;
}
body.helpme #ih_button, #ih_button:hover {
  border-color: #6696ce;
  background-color: #9cc1db;
  text-shadow: 1px 1px 2px #6696ce;
}
body:not(.helpme) .input_container .description {
  display: none;
}
body:not(.helpme) .input_container .ih_balloon {
  display: none;
}

.source_info {
  font-size: 0.9em;
  column-width: 25em;
  margin-left: 1em;
}
.source_info:not(:empty) {
  margin-bottom: 1em;
}
.source_info > p {
  margin: 0;
}
.source_info > div {
  color: #777;
  cursor: pointer;
}
.source_info > div:hover,
.source_info > div.active {
  color: inherit;
}
.source_info > div:before {
  content: '☐ ';
}
.source_info > div.active:before {
  content: '☑ ';
}

#popup {
  position: fixed;
  top: 5%;
  left: 5%;
  bottom: 5%;
  right: 5%;
  border: 1px solid #b4b4b4;
  background-color: #fff;
  box-shadow: 0.2em 0.2em 0.5em rgba(0,0,0,0.2);
  padding: 0.5em;
  z-index: 10;
  color: rgba(0,0,0,0.9);
}
#popup > .close {
  position: absolute;
  top: 0.5em;
  right: 0.5em;
}
.qr_container {
  display: flex;
  flex-flow: column nowrap;
  width: 100%;
  height: 100%;
  text-align: center;
  padding: 1em;
  box-sizing: border-box;
}
.qr_container .qrcode {
  flex-grow: 1;
}

.bigbuttons {
  display: flex;
  flex-flow: row nowrap;
  width: 40.25em;
  justify-content: space-around;
}
.bigbuttons button {
  width: 10em;
  height: 10em;
  padding-top: 8em;
  position: relative;
}
.bigbuttons button:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-position: center;
  background-repeat: no-repeat;
}

.preview_icons .button_container {
  display: flex;
  flex-flow: row wrap;
}
.preview_icons .button_container > * {
  width: 48%;
  margin-top: 0.25em;
  font-size: inherit;
}

#cursor {
  border-style: solid;
  height: 0;
  width: 0;
  position: absolute;
  border-width: 1em 1em 0 0;
  border-color: red transparent;
}
.field {
  transition: background 0.5s;
}
.hasFocus {
  background-color: rgba(255,0,0,0.5);
}
.hasChanged {
  outline: 1px solid red;
}
#screenlog {
  max-height: 50vh;
  overflow-y: auto;
  overflow-x: hidden;
  max-width: 28em;
  font-size: 0.5em;
}
.mistvideo * {
  min-width: initial;
}
.mistvideo h3 {
  color: inherit;
  text-shadow: none;
}
.mistvideo table {
  color: inherit;
  box-shadow: none;
  border: none;
  margin: 0;
}
.mistvideo table tr {
  background: none;
}
.mistvideo table td {
  padding: 0;
}
.mistvideo button {
  background-image: none;
}
.mistvideo .text {
  font-size: inherit;
}
.mistvideo-container * {  min-width: auto; }
.player_log {
  overflow-y: auto;
  max-height: 10em;
  max-width: 50%;
  font-size: 0.8em;
  color: rgba(0,0,0,0.8);
  margin-bottom: 1em;
}
.mistvideo-log table {
  width: auto;
  box-shadow: none;
  border: none;
}
.mistvideo-log table tr {
  background-color: transparent;
}
.mistvideo-container {
  display: flex;
}
.mistvideo-column {
  flex-direction: column;
}
.UIelement .inputlist .field_container {
 margin-bottom: 0.2em; 
}
.UIelement.custom_url_parameters .field_container .field_container .unit:before {
  content: "&";
  width: 0.8em;
  display: block;
  text-align: center;
}
.UIelement.custom_url_parameters .field_container .field_container:first-child .unit:before {
  content: "?";
}
